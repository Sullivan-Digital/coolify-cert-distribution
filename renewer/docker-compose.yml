# Deploy this as a Docker Compose resource in Coolify.
#
# This container stays running continuously (sleep infinity). The actual
# renewal work is triggered by Coolify's Scheduled Tasks feature, which
# runs `docker exec cert-renewer /usr/local/bin/renew.sh` on a cron.
# See README for scheduled-task setup.
#
# Required environment variables (set these in Coolify's UI, not here):
#   CERT_DOMAIN               e.g. internal.sullivandigital.com.au
#   ACME_EMAIL                contact for Let's Encrypt
#   AWS_ACCESS_KEY_ID         IAM user with Route 53 + S3 permissions
#   AWS_SECRET_ACCESS_KEY
#   AWS_REGION                e.g. ap-southeast-2
#   AWS_HOSTED_ZONE_ID        Route 53 zone id for the parent domain
#   S3_BUCKET                 bucket name that holds the cert
#
# Optional:
#   S3_PREFIX                 key prefix in bucket (default: certs/wildcard)
#   USE_STAGING               "true" to use Let's Encrypt staging (for testing)
#   RENEW_DAYS                days-before-expiry renewal window (default: 30)

services:
  cert-renewer:
    build:
      context: .
      dockerfile: Dockerfile
    image: cert-renewer:latest
    container_name: cert-renewer
    environment:
      - CERT_DOMAIN
      - ACME_EMAIL
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - AWS_REGION
      - AWS_HOSTED_ZONE_ID
      - S3_BUCKET
      - S3_PREFIX
      - USE_STAGING
      - RENEW_DAYS
    volumes:
      # Persists the ACME account key and the issued cert across runs.
      # Losing this is not catastrophic (lego will just re-register and
      # re-issue), but it burns a rate-limit slot unnecessarily.
      - lego_data:/data/lego
    # Container stays up continuously so Coolify's Scheduled Tasks feature
    # can `docker exec` into it on a cron. The actual work is triggered by
    # the scheduled task, not by container lifecycle.
    restart: unless-stopped

volumes:
  lego_data:
