# Deploy this as a Docker Compose resource in Coolify.
#
# The container loops internally: runner.sh invokes renew.sh every
# RUN_INTERVAL_SECONDS (default 6h) for the life of the container, and
# records each run's outcome to /var/run/cert-renewer.status for the
# healthcheck. No Coolify Scheduled Task setup is needed — deploy and
# forget. For ad-hoc or --force runs, `docker exec cert-renewer
# /usr/local/bin/renew.sh [--force]` still works.
#
# Required environment variables (set these in Coolify's UI, not here):
#   MANAGED_CERTS       whitespace-separated list of cert domains to issue
#                       (e.g. "*.foo.com *.internal.foo.com coolify.bar.com").
#                       Each entry must be declared in the CDK `certs` input;
#                       the renewer looks up each one's zone via SSM.
#   ACME_EMAIL          contact for Let's Encrypt
#
# Optional:
#   STACK_NAME          CDK stack name for SSM parameter paths. Default:
#                       CertDistributionStack. Match whatever you deployed.
#   S3_BUCKET           bucket name. Optional: if unset, read from
#                       /${STACK_NAME}/bucketName in SSM.
#   AWS_REGION          resolved from IMDSv2 at startup on EC2, so normally
#                       leave unset. Set explicitly if running without IMDS.
#   AWS_ACCESS_KEY_ID   omit on EC2 with an instance role — lego and the AWS
#   AWS_SECRET_ACCESS_KEY   CLI both pick up creds from IMDS.
#   USE_STAGING         "true" for Let's Encrypt staging (testing)
#   RENEW_DAYS          days-before-expiry renewal window (default: 30)
#   RUN_INTERVAL_SECONDS   seconds between runner.sh iterations (default: 21600 = 6h)
#   LEGO_ROOT           parent dir for per-cert lego state (default: /data/lego)

services:
  cert-renewer:
    build:
      context: .
      dockerfile: Dockerfile
    image: cert-renewer:latest
    container_name: cert-renewer
    # Host networking so IMDSv2 is reachable without touching the instance's
    # HttpPutResponseHopLimit (EC2 default 1 blocks bridge-mode containers).
    # Neither renew.sh nor the healthcheck listens on any port, so there's
    # no collision risk with services on the host.
    network_mode: host
    environment:
      - MANAGED_CERTS
      - ACME_EMAIL
    volumes:
      # Persists the ACME account keys and issued certs across runs. Losing
      # this is not catastrophic (lego will just re-register and re-issue),
      # but it burns LE rate-limit slots unnecessarily.
      - lego_data:/data/lego
    # Healthcheck fails if either:
    #   - the last runner.sh iteration of renew.sh failed
    #     (/var/run/cert-renewer.status), or
    #   - any cert's S3 metadata.json is missing or expires within 14 days
    #     (HEALTHCHECK_WARN_DAYS).
    # Coolify surfaces unhealthy containers via its notifications.
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh"]
      interval: 1h
      timeout: 30s
      start_period: 10m
      retries: 3
    restart: unless-stopped

volumes:
  lego_data:
