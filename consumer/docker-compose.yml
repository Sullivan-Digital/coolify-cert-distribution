# Deploy this as a Docker Compose resource in Coolify on EACH server that
# runs a coolify-proxy (Traefik) instance that should serve the wildcard cert.
#
# On startup the container runs fetch.sh once to bootstrap the cert, then
# stays running continuously (sleep infinity). Ongoing fetches are triggered
# by Coolify's Scheduled Tasks feature, which runs
# `docker exec cert-consumer /usr/local/bin/fetch.sh` on a cron.
# See README for scheduled-task setup.
#
# Required environment variables (set in Coolify's UI):
#   AWS_REGION                e.g. ap-southeast-2
#   S3_BUCKET                 same bucket as the renewer writes to
#
# Optional:
#   AWS_ACCESS_KEY_ID         IAM user with READ-ONLY access to the cert bucket.
#   AWS_SECRET_ACCESS_KEY     Omit both when running on EC2 with an instance
#                             role attached — the AWS CLI will pick up creds
#                             from IMDS automatically.
#   S3_PREFIX                 default: certs/wildcard
#   RELOAD_METHOD             touch (default) | restart | none
#   PROXY_CONTAINER           default: coolify-proxy (only used if RELOAD_METHOD=restart)

services:
  cert-consumer:
    build:
      context: .
      dockerfile: Dockerfile
    image: cert-consumer:latest
    container_name: cert-consumer
    environment:
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - AWS_REGION
      - S3_BUCKET
      - S3_PREFIX
      - RELOAD_METHOD
      - PROXY_CONTAINER
    volumes:
      # Bind-mount the host's /data/coolify/proxy directory so we can write
      # to the same location that coolify-proxy reads from. Inside the
      # container this appears at /host-coolify/proxy.
      - /data/coolify/proxy:/host-coolify/proxy
      # Required only if RELOAD_METHOD=restart: lets the container run
      # `docker restart coolify-proxy`. If you're using RELOAD_METHOD=touch
      # (recommended), you can remove this mount.
      - /var/run/docker.sock:/var/run/docker.sock
    # Healthcheck fails if the local wildcard.crt is missing or expires
    # within 14 days. Catches the silent-failure mode from the consumer
    # side: fetch.sh has been broken long enough that the on-disk cert
    # Traefik is serving is about to expire. Coolify surfaces unhealthy
    # containers via its notifications.
    # Note: on a fresh install the container will be unhealthy until
    # the first fetch.sh run (README instructs to trigger it manually).
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh"]
      interval: 1h
      timeout: 10s
      start_period: 1m
      retries: 3
    restart: unless-stopped
