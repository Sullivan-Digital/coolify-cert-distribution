# Deploy this as a Docker Compose resource in Coolify on EACH server that
# runs a coolify-proxy (Traefik) instance that should serve the distributed
# certs.
#
# The container loops internally: runner.sh runs fetch.sh immediately
# (bootstrap) and then every RUN_INTERVAL_SECONDS (default 6h) for the
# life of the container. A failed bootstrap run exits the container so
# Coolify's restart policy loops it — day-1 config errors (IAM, bucket,
# network, SSM mappings) surface as a visible crashloop. Subsequent
# failures are recorded in /var/run/cert-consumer.status for the
# healthcheck, but don't kill the loop. No Coolify Scheduled Task setup
# is needed.
#
# Required environment variables: none — the consumer discovers everything
# from SSM. On EC2 with an instance role attached, deploy with no env vars
# and it just works.
#
# Optional:
#   STACK_NAME          CDK stack name for SSM parameter paths. Default:
#                       CertDistributionStack. Match whatever you deployed.
#   FETCHED_CERTS       whitespace-separated list of cert domains to fetch.
#                       Each entry must match exactly a cert value in the SSM
#                       mappings (no globbing — if you want *.foo.com, list
#                       the literal string "*.foo.com"). Default: fetch every
#                       cert in the mapping table.
#   S3_BUCKET           bucket name. Optional: if unset, read from
#                       /${STACK_NAME}/bucketName in SSM.
#   AWS_REGION          resolved from IMDSv2 at startup on EC2 (best-effort);
#                       set explicitly if running without IMDS.
#   AWS_ACCESS_KEY_ID   omit on EC2 with an instance role — the AWS CLI picks
#   AWS_SECRET_ACCESS_KEY   up creds from IMDS automatically.
#   RELOAD_METHOD       touch (default) | restart | none
#   PROXY_CONTAINER     default: coolify-proxy (only used if RELOAD_METHOD=restart)
#   RUN_INTERVAL_SECONDS   seconds between runner.sh iterations (default: 21600 = 6h)
#
# Upgrade note: earlier versions of this container read `S3_PREFIX`; it is
# silently ignored now. Safe to remove from Coolify env on existing deploys.

services:
  cert-consumer:
    build:
      context: .
      dockerfile: Dockerfile
    image: cert-consumer:latest
    container_name: cert-consumer
    # Host networking so IMDSv2 is reachable without touching the instance's
    # HttpPutResponseHopLimit (EC2 default 1 blocks bridge-mode containers).
    # fetch.sh and the healthcheck don't listen on any port, so there's no
    # collision risk with Traefik or other services on the host.
    network_mode: host
    volumes:
      # Bind-mount the host's /data/coolify/proxy directory so we can write
      # to the same location that coolify-proxy reads from. Inside the
      # container this appears at /host-coolify/proxy.
      - /data/coolify/proxy:/host-coolify/proxy
      # Required only if RELOAD_METHOD=restart. If you're using the default
      # RELOAD_METHOD=touch, you can remove this mount.
      - /var/run/docker.sock:/var/run/docker.sock
    # Healthcheck fails if either:
    #   - the last runner.sh iteration of fetch.sh failed
    #     (/var/run/cert-consumer.status), or
    #   - any expected cert (FETCHED_CERTS if set, else every cert in the
    #     SSM mappings) is missing on disk or expires within 14 days.
    # start_period covers the window before runner.sh's first iteration
    # writes the status file.
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh"]
      interval: 1h
      timeout: 10s
      start_period: 2m
      retries: 3
    restart: unless-stopped
